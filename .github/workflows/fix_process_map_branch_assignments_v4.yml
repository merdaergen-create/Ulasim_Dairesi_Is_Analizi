name: 15 süreç haritalarındaki şube eşleştirmelerini düzelt

on:
  push:
    branches: [main]
    paths:
      - '09_yalin_pozisyonlari/**'
      - '15_yalin_surec_haritalari/**'
      - 'scripts/fix_process_map_branch_assignments_v4.py'
      - '.github/workflows/fix_process_map_branch_assignments_v4.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu al
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Şube eşleştirmelerini düzelt
        run: python scripts/fix_process_map_branch_assignments_v4.py

      - name: Kontrol et
        run: |
          grep -R -F '<br/>Şube: Ulaşım Planlama Şube Müdürlüğü' 15_yalin_surec_haritalari/trafik_planlama --include='*.md' >/dev/null
          grep -R -F '<br/>Şube: Akıllı Ulaşım Sistemleri ve Trafik Yönetim Merkezi Şube Müdürlüğü' 15_yalin_surec_haritalari/akilli_ulasim --include='*.md' >/dev/null

      - name: Değişiklikleri kaydet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 15_yalin_surec_haritalari
          if git diff --cached --quiet; then
            echo "Değişiklik yok."
          else
            git commit -m "15 süreç haritalarındaki şube eşleştirmelerini düzelt"
            git push
          fi
