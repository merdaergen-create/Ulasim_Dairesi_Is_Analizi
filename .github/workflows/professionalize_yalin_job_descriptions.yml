name: Yalın görev tanımlarını profesyonelleştir

on:
  push:
    branches: [main]
    paths:
      - 'scripts/professionalize_yalin_job_descriptions.py'
      - '.github/workflows/professionalize_yalin_job_descriptions.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu al
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Görev tanımlarını standardize et
        run: python scripts/professionalize_yalin_job_descriptions.py

      - name: Çıktıları doğrula
        run: |
          grep -R -F '**Pozisyonun amacı:**' 10_yalin_pozisyon_gorev_tanimlari/*.md >/dev/null
          grep -R -F '### Temel görev ve sorumluluklar' 10_yalin_pozisyon_gorev_tanimlari/*.md >/dev/null
          grep -R -F '### Görev ayrılığı ve iç kontrol' 10_yalin_pozisyon_gorev_tanimlari/*.md >/dev/null
          grep -R -F '### Kullanılan kayıt ve formlar' 10_yalin_pozisyon_gorev_tanimlari/*.md >/dev/null

      - name: Değişiklikleri main dalına kaydet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 10_yalin_pozisyon_gorev_tanimlari
          if git diff --cached --quiet; then
            echo "Değişiklik yok."
          else
            git commit -m "Yalın pozisyon görev tanımlarını profesyonel standartta tamamla"
            git push
          fi
