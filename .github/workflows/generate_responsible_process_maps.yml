name: Sorumlu süreç haritalarını üret

on:
  push:
    branches: [main]
    paths:
      - '05_surec_haritalari/**'
      - '07_hedef_gorev_tanimlari/**'
      - 'scripts/generate_responsible_process_maps.py'
      - '.github/workflows/generate_responsible_process_maps.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu al
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sorumlu haritaları üret
        run: python scripts/generate_responsible_process_maps.py

      - name: Değişiklikleri doğrula
        run: |
          test -f 08_surec_haritalari_sorumlulari_belirtilmis/README.md
          grep -R "Sorumlu:" 08_surec_haritalari_sorumlulari_belirtilmis/*/README.md >/dev/null

      - name: Üretilen haritaları main dalına kaydet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 08_surec_haritalari_sorumlulari_belirtilmis
          if git diff --cached --quiet; then
            echo "Değişiklik yok."
          else
            git commit -m "Süreç haritalarını koruyarak sorumlu pozisyonları ekle"
            git push
          fi
